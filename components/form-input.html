<!-- ────────────────────────────────────────────────────────────
     TYPE 7: Select / Dropdown (Custom — NEVER native <select>)
     Figma: "Textbox without Label" + Input Types = true
     STRUCTURE (from Figma node inspection):
       .form-dropdown-trigger  (flex wrapper = outer border box)
         ├── input.form-input.form-input--select  (text zone, borderless)
         └── .form-dropdown-trigger__icon  (26×26 chevron box, #F5F5F5 bg)
               └── img icon-dropdown-chevron.svg (14×14)

     Figma specs — TRIGGER wrapper ("Frame 5"):
       280×26, bg #FFF, 1px #C4C4C4 stroke INSIDE, corner-radius 2px,
       padding: 12px left, 0 right, 3px top/bottom, horizontal auto-layout.

     Figma specs — CHEVRON ZONE ("Input Type" instance):
       26×26, bg #F5F5F5, 1px #C4C4C4 stroke INSIDE,
       corner-radius: 0 top-right:2 0 bottom-right:2 (only RIGHT corners),
       padding 6px all sides, centres a 14×14 chevron arrow.
       The left border of this box acts as the visual divider.

     Gap: 4px between trigger and dropdown panel
          (form-dropdown.css sets `top: calc(100% + 4px)`)

     ⚠️ PLACEHOLDER RULE (ZERO TOLERANCE):
       "- Select -" / "Enter Value" / "Choose an option" is PLACEHOLDER text.
       It goes in the `placeholder` attribute — NEVER as a `.form-dropdown__item`.

       ✅ Empty state:     placeholder="- Select -"  (no value attr, no first item)
       ✅ Pre-selected:    value="Windows Server"    + matching --selected item
       ❌ WRONG:           value="- Select -"        + <div>- Select -</div> in panel
     ──────────────────────────────────────────────────────────── -->
